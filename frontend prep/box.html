<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>box mardin</title>
    <link rel="stylesheet" href="box.css" />
    <style>
      .box3 {
         position: absolute;
  top: 10%;
  left: 10%;
  right: 10%;
  bottom: 10%;

  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(5px);
  color: white;
  border-radius: 20px;
  padding: 1em;
  font-size: 1.4rem;
  z-index: 1000;
      }
      .box2{
          background: rgba(0, 0, 0, 0.7);
  color: white;
  padding: 1em;
  margin: 0.5em;
  transition: all 0.3s ease-in-out;
  opacity: 1;
  line-height: 1;
  border-right: 10px solid rgba(50, 255, 50, 0.3);
  display: inline-block;
  float: right;
  gap: 20px;
  bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="box box1">I Am A Box</div>
    <div class="box box3">I Am Third Box</div>
    <div class="box box2">I Am Another Box</div>
  </body>
</html>
